name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: grok-eliminator-linux-x86_64.tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            asset: grok-eliminator-macos-aarch64.tar.gz
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            asset: grok-eliminator-macos-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: grok-eliminator-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir dist
          cp "target/${{ matrix.target }}/release/grok-eliminator" dist/
          cp README.md LICENSE dist/
          tar -C dist -czf "${{ matrix.asset }}" .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\grok-eliminator.exe" dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE dist\
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes
