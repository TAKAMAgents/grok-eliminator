name: Bug report
description: Report incorrect audit or cleanup behavior.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include real API keys, tokens, shell history, or private paths that should not be public.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The released version or commit SHA you ran.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact command you ran, with private paths redacted.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include sanitized JSON or text reports if useful.
